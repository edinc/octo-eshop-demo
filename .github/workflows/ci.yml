name: CI Pipeline

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

env:
  NODE_VERSION: '22'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npx prettier --check .

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres-user:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: userdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres-product:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: productdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres-order:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: orderdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma clients
        run: |
          cd services/user-service && npx prisma generate
          cd ../product-service && npx prisma generate
          cd ../order-service && npx prisma generate

      - name: Build shared packages
        run: |
          npm run build --workspace=shared/types
          npm run build --workspace=shared/utils

      - name: Build services
        run: |
          npm run build --workspace=services/user-service
          npm run build --workspace=services/product-service
          npm run build --workspace=services/cart-service
          npm run build --workspace=services/order-service
          npm run build --workspace=services/payment-service

      - name: Run tests with coverage
        run: npm run test:ci --workspaces --if-present
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/userdb
          USER_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/userdb
          PRODUCT_DATABASE_URL: postgresql://postgres:postgres@localhost:5433/productdb
          ORDER_DATABASE_URL: postgresql://postgres:postgres@localhost:5434/orderdb
          REDIS_URL: redis://localhost:6379

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .artifacts/
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 7

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always() && github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download test artifacts
        # continue-on-error so the summary job still runs even when build-and-test
        # failed before the artifact upload (e.g. compile error before tests ran).
        # The aggregation script handles missing reports with a fallback message.
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: test-results
          path: .artifacts/

      - name: Aggregate test results
        run: node scripts/aggregate-test-results.mjs

      - name: Find existing PR comment
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: '<!-- ci-test-summary -->'

      - name: Post or update PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: .artifacts/test-summary.md
          edit-mode: replace

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - product-service
          - cart-service
          - order-service
          - payment-service
          - frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          tags: ${{ matrix.service }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure/terraform/environments/dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.5'

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Format Check
        run: terraform fmt -check -recursive ../../

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Lint all charts
        run: |
          for chart in helm/charts/*/; do
            if [ -f "$chart/Chart.yaml" ]; then
              echo "Linting $(basename $chart)..."
              helm lint "$chart"
            fi
          done

      - name: Template render test
        run: |
          for chart in helm/charts/*/; do
            name=$(basename "$chart")
            if [ ! -f "$chart/Chart.yaml" ]; then
              continue
            fi
            echo "Templating $name..."
            if [ -f "$chart/values-dev.yaml" ]; then
              helm template "$name" "$chart" -f "$chart/values-dev.yaml" > /dev/null
            else
              helm template "$name" "$chart" > /dev/null
            fi
          done
